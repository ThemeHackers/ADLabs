services:
  rbcd-wg-gateway:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: rbcd-wg-gateway
    cap_add:
      - NET_ADMIN
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Bangkok
      - SERVERURL=127.0.0.1
      - SERVERPORT=51825
      - PEERS=1
      - PEERDNS=10.105.10.10
      - INTERNAL_SUBNET=10.252.6.0/24
      - ALLOWEDIPS=10.105.10.0/24,10.105.20.0/24
    volumes:
      - ./wireguard_rbcd:/config
    ports:
      - 51825:51820/udp
    networks:
      ad-net: { ipv4_address: 10.105.10.150 }
      srv-net: { ipv4_address: 10.105.20.150 }
    restart: unless-stopped

  rbcd-core-router:
    image: debian:bullseye-slim
    container_name: rbcd-core-router
    privileged: true
    cap_add:
      - NET_ADMIN
    command: >
      sh -c "apt-get update && apt-get install -y iptables iproute2 net-tools procps &&
             sysctl -w net.ipv4.ip_forward=1 &&
             iptables -t nat -A POSTROUTING -j MASQUERADE &&
             sleep infinity"
    networks:
      ad-net: { ipv4_address: 10.105.10.254 }
      srv-net: { ipv4_address: 10.105.20.254 }
    restart: always

  rbcd-dc:
    image: linuxcrafts/samba-ad-dc:latest
    container_name: rbcd-dc
    privileged: true
    cap_add:
      - NET_ADMIN
    entrypoint: 
      - /bin/sh
      - -c
      - |
        ip route add 10.105.20.0/24 via 10.105.10.254 || true
        

        rm -rf /var/lib/samba
        ln -sf /samba /var/lib/samba
        
      
        mkdir -p /etc/samba
        rm -f /etc/samba/smb.conf
        ln -sf /samba/etc/smb.conf /etc/samba/smb.conf
        
        chmod 700 /samba/private/msg.sock || true
        rm -f /samba/private/tls/*.pem || true
        
        echo "Starting Samba AD DC and applying fixes..."
        
        (
          sleep 15
          ln -sf /samba/etc/smb.conf /etc/samba/smb.conf
          samba-tool dbcheck --cross-ncs --fix --yes --configfile=/samba/etc/smb.conf
          samba-tool ntacl sysvolreset --configfile=/samba/etc/smb.conf
        ) &
        
        exec /samba-ad-dc
    environment:
      - DOMAIN=RBCDLAB
      - REALM=RBCDLAB.LOCAL
      - ADMIN_PASSWORD=RBCDAccessAdminPass2026!
    volumes:
      - rbcd-dc-data:/samba
    networks:
      ad-net: { ipv4_address: 10.105.10.10 }
    dns: 127.0.0.1
    restart: unless-stopped

  rbcd-target-srv:
    image: debian:bullseye-slim
    container_name: rbcd-target-srv
    privileged: true
    cap_add:
      - NET_ADMIN
    command: >
      sh -c "apt-get update && apt-get install -y iproute2 procps python3 &&
             ip route add 10.105.10.0/24 via 10.105.20.254 || true;
             echo 'OSCP{rbcd_server_compromise_successful}' > /flag.txt &&
             mkdir -p /var/www &&
             echo 'Target Web Server Running' > /var/www/index.html &&
             cd /var/www &&
             python3 -m http.server 80"
    networks:
      srv-net: { ipv4_address: 10.105.20.20 }
    restart: unless-stopped

networks:
  ad-net: { ipam: { config: [{ subnet: 10.105.10.0/24 }] } }
  srv-net: { ipam: { config: [{ subnet: 10.105.20.0/24 }] } }

volumes:
  rbcd-dc-data:
