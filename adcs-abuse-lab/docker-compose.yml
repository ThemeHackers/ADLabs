services:
  adcs-wg-gateway:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: adcs-wg-gateway
    cap_add:
      - NET_ADMIN
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Bangkok
      - SERVERURL=192.168.1.157
      - SERVERPORT=51820
      - PEERS=1
      - PEERDNS=10.102.10.10
      - INTERNAL_SUBNET=10.252.1.0/24
      - ALLOWEDIPS=10.102.10.0/24,10.102.20.0/24
    volumes:
      - ./wireguard_adcs:/config
    ports:
      - 51820:51820/udp
    networks:
      ad-net: { ipv4_address: 10.102.10.150 }
      ca-net: { ipv4_address: 10.102.20.150 }
    restart: unless-stopped

  adcs-router:
    image: debian:bullseye-slim
    container_name: adcs-core-router
    privileged: true
    cap_add:
      - NET_ADMIN
    restart: always 
    command: >
      sh -c "apt-get update && apt-get install -y iptables iproute2 net-tools procps iputils-ping &&
             sysctl -w net.ipv4.ip_forward=1 &&
             iptables -t nat -A POSTROUTING -j MASQUERADE &&
             sleep infinity"
    networks:
      ad-net: { ipv4_address: 10.102.10.254 }
      ca-net: { ipv4_address: 10.102.20.254 }

  adcs-dc:
    image: linuxcrafts/samba-ad-dc:latest
    container_name: adcs-dc
    privileged: true
    cap_add:
      - NET_ADMIN
    entrypoint: ["/bin/sh", "-c", "ip route add 10.102.20.0/24 via 10.102.10.254 || true; python3 /tmp/auth.py & exec /samba-ad-dc"]
    environment:
      - DOMAIN=ADCSLAB
      - REALM=ADCSLAB.LOCAL
      - ADMIN_PASSWORD=ADCSLabAdminPass2026!
    volumes:
      - adcs-samba-rw:/var/lib/samba
      - ./dc-auth/auth.py:/tmp/auth.py
      - ca-temp-share:/tmp/ca
    networks:
      ad-net: { ipv4_address: 10.102.10.10 }
    dns: 127.0.0.1
    restart: unless-stopped

  adcs-ca-mock:
    image: python:3.11-slim
    container_name: adcs-ca-mock
    privileged: true
    cap_add:
      - NET_ADMIN
    command: >
      sh -c "apt-get update && apt-get install -y openssl iproute2 procps &&
             ip route add 10.102.10.0/24 via 10.102.20.254 || true;
             python3 /tmp/ca.py"
    volumes:
      - ./ca-server/ca.py:/tmp/ca.py
      - ca-temp-share:/tmp/ca
    networks:
      ca-net: { ipv4_address: 10.102.20.20 }
    restart: unless-stopped

networks:
  ad-net: { ipam: { config: [{ subnet: 10.102.10.0/24 }] } }
  ca-net: { ipam: { config: [{ subnet: 10.102.20.0/24 }] } }

volumes:
  adcs-samba-rw:
  ca-temp-share:
