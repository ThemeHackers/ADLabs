services:
  sql-wg-gateway:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: sql-wg-gateway
    cap_add:
      - NET_ADMIN
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Bangkok
      - SERVERURL=127.0.0.1
      - SERVERPORT=51826
      - PEERS=1
      - PEERDNS=10.106.10.10
      - INTERNAL_SUBNET=10.252.7.0/24
      - ALLOWEDIPS=10.106.10.0/24,10.106.20.0/24
    volumes:
      - ./wireguard_sql:/config
    ports:
      - 51826:51820/udp
    networks:
      ad-net: { ipv4_address: 10.106.10.150 }
      sql-net: { ipv4_address: 10.106.20.150 }
    restart: unless-stopped

  sql-core-router:
    image: debian:bullseye-slim
    container_name: sql-core-router
    privileged: true
    cap_add:
      - NET_ADMIN
    command: >
      sh -c "apt-get update && apt-get install -y iptables iproute2 net-tools procps &&
             sysctl -w net.ipv4.ip_forward=1 &&
             iptables -t nat -A POSTROUTING -j MASQUERADE &&
             sleep infinity"
    networks:
      ad-net: { ipv4_address: 10.106.10.254 }
      sql-net: { ipv4_address: 10.106.20.254 }
    restart: always

  sql-dc:
    image: linuxcrafts/samba-ad-dc:latest
    container_name: sql-dc
    privileged: true
    cap_add:
      - NET_ADMIN
    entrypoint: ["/bin/sh", "-c", "ip route add 10.106.20.0/24 via 10.106.10.254 || true; exec /samba-ad-dc"]
    environment:
      - DOMAIN=SQLPIVOT
      - REALM=SQLPIVOT.LOCAL
      - ADMIN_PASSWORD=SQLPivotAdminPass2026!
    volumes:
      - sql-dc-data:/var/lib/samba
    networks:
      ad-net: { ipv4_address: 10.106.10.10 }
    dns: 127.0.0.1
    restart: unless-stopped

  sql-front:
    image: vulhub/postgres:10.7
    container_name: sql-front
    user: root
    privileged: true
    cap_add:
      - NET_ADMIN
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=FrontDBAdminPass2026!
    command: >
      sh -c "apt-get update && apt-get install -y iproute2 &&
             ip route del default || true;
             ip route add default via 10.106.20.254;
             mkdir -p /var/lib/postgresql;
             echo 'host=10.106.10.20 user=postgres password=SuperSecureBackPass2026! dbname=postgres' > /var/lib/postgresql/db_backup.cfg;
             chown -R postgres:postgres /var/lib/postgresql;
             exec docker-entrypoint.sh postgres"
    networks:
      sql-net: { ipv4_address: 10.106.20.20 }
    restart: unless-stopped

  sql-back:
    image: vulhub/postgres:10.7
    container_name: sql-back
    user: root
    privileged: true
    cap_add:
      - NET_ADMIN
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=SuperSecureBackPass2026!
    command: >
      sh -c "apt-get update && apt-get install -y iproute2 &&
             ip route del default || true;
             ip route add default via 10.106.10.254;
             echo 'OSCP{sql_database_link_pivot_won}' > /flag.txt;
             exec docker-entrypoint.sh postgres"
    networks:
      ad-net: { ipv4_address: 10.106.10.20 }
    restart: unless-stopped

networks:
  ad-net: { ipam: { config: [{ subnet: 10.106.10.0/24 }] } }
  sql-net: { ipam: { config: [{ subnet: 10.106.20.0/24 }] } }

volumes:
  sql-dc-data:
