services:
  laps-wg-gateway:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: laps-wg-gateway
    cap_add:
      - NET_ADMIN
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Bangkok
      - SERVERURL=127.0.0.1
      - SERVERPORT=51827
      - PEERS=1
      - PEERDNS=10.107.10.10
      - INTERNAL_SUBNET=10.252.8.0/24
      - ALLOWEDIPS=10.107.10.0/24,10.107.20.0/24
    volumes:
      - ./wireguard_laps:/config
    ports:
      - 51827:51820/udp
    networks:
      ad-net: { ipv4_address: 10.107.10.150 }
      srv-net: { ipv4_address: 10.107.20.150 }
    restart: unless-stopped

  laps-core-router:
    image: debian:bullseye-slim
    container_name: laps-core-router
    privileged: true
    cap_add:
      - NET_ADMIN
    command: >
      sh -c "apt-get update && apt-get install -y iptables iproute2 net-tools procps &&
             sysctl -w net.ipv4.ip_forward=1 &&
             iptables -t nat -A POSTROUTING -j MASQUERADE &&
             sleep infinity"
    networks:
      ad-net: { ipv4_address: 10.107.10.254 }
      srv-net: { ipv4_address: 10.107.20.254 }
    restart: always

  laps-dc:
    image: linuxcrafts/samba-ad-dc:latest
    container_name: laps-dc
    privileged: true
    cap_add:
      - NET_ADMIN
    entrypoint: ["/bin/sh", "-c", "ip route add 10.107.20.0/24 via 10.107.10.254 || true; exec /samba-ad-dc"]
    environment:
      - DOMAIN=LAPSLAB
      - REALM=LAPSLAB.LOCAL
      - ADMIN_PASSWORD=LAPSAdminPass2026!
    volumes:
      - laps-dc-data:/var/lib/samba
    networks:
      ad-net: { ipv4_address: 10.107.10.10 }
    dns: 127.0.0.1
    restart: unless-stopped

  laps-finance-srv:
    image: debian:bullseye-slim
    container_name: laps-finance-srv
    privileged: true
    cap_add:
      - NET_ADMIN
    command: >
      sh -c "apt-get update && apt-get install -y iproute2 procps python3 &&
             ip route add 10.107.10.0/24 via 10.107.20.254 || true;
             echo 'OSCP{laps_leaked_credentials_access}' > /flag.txt &&
             mkdir -p /var/www &&
             echo 'Finance Portal' > /var/www/index.html &&
             cd /var/www &&
             python3 -m http.server 80"
    networks:
      srv-net: { ipv4_address: 10.107.20.20 }
    restart: unless-stopped

networks:
  ad-net: { ipam: { config: [{ subnet: 10.107.10.0/24 }] } }
  srv-net: { ipam: { config: [{ subnet: 10.107.20.0/24 }] } }

volumes:
  laps-dc-data:
