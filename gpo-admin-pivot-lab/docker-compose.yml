services:
  gpo-wg-gateway:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: gpo-wg-gateway
    cap_add:
      - NET_ADMIN
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Bangkok
      - SERVERURL=192.168.1.157
      - SERVERPORT=51820
      - PEERS=1
      - PEERDNS=10.104.10.10
      - INTERNAL_SUBNET=10.252.1.0/24
      - ALLOWEDIPS=10.104.10.0/24,10.104.20.0/24
    volumes:
      - ./wireguard_gpo:/config
    ports:
      - 51820:51820/udp
    networks:
      ad-net: { ipv4_address: 10.104.10.150 }
      client-net: { ipv4_address: 10.104.20.150 }
    restart: unless-stopped

  gpo-router:
    image: debian:bullseye-slim
    container_name: gpo-core-router
    privileged: true
    cap_add:
      - NET_ADMIN
    restart: always 
    command: >
      bash -c "apt-get update && apt-get install -y iptables iproute2 net-tools procps iputils-ping &&
               sysctl -w net.ipv4.ip_forward=1 &&
               iptables -t nat -A POSTROUTING -j MASQUERADE &&
               sleep infinity"
    networks:
      ad-net: { ipv4_address: 10.104.10.254 }
      client-net: { ipv4_address: 10.104.20.254 }

  gpo-dc:
    image: linuxcrafts/samba-ad-dc:latest
    container_name: gpo-dc
    privileged: true
    environment:
      - DOMAIN=GPOLAB
      - REALM=GPOLAB.LOCAL
      - ADMIN_PASSWORD=GPOLabAdminPass2026!
    volumes:
      - gpo-samba-rw:/var/lib/samba
    networks:
      ad-net: { ipv4_address: 10.104.10.10 }
    dns: 127.0.0.1
    restart: unless-stopped

  gpo-client-sim:
    image: debian:bullseye-slim
    container_name: gpo-client-sim
    privileged: true
    restart: unless-stopped
    volumes:
      - gpo-samba-rw:/sysvol
    command: >
      bash -c "apt-get update && apt-get install -y iproute2 procps &&
               (ip route add 10.252.5.0/24 via 10.104.20.150 || true) &&
               echo 'OSCP{gpo_workstation_pivot_achieved}' > /root/flag.txt &&
               mkdir -p /var/log &&
               echo 'Backup task completed by domain_admin:GPOLabAdminPass2026!' > /var/log/backup.log &&
               echo 'Workstation agent started. Waiting for policy script...' &&
               sleep 30 &&
               while true; do
                 if [ -f /sysvol/sysvol/gpolab.local/scripts/update.sh ]; then
                   echo 'Executing update script...' &&
                   sh /sysvol/sysvol/gpolab.local/scripts/update.sh || true;
                 fi;
                 sleep 60;
               done"
    networks:
      client-net: { ipv4_address: 10.104.20.20 }

networks:
  ad-net: { ipam: { config: [{ subnet: 10.104.10.0/24 }] } }
  client-net: { ipam: { config: [{ subnet: 10.104.20.0/24 }] } }

volumes:
  gpo-samba-rw:
