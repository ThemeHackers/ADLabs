services:
  trust-wg-gateway:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: trust-wg-gateway
    cap_add:
      - NET_ADMIN
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Bangkok
      - SERVERURL=127.0.0.1
      - SERVERPORT=51823
      - PEERS=1
      - PEERDNS=10.103.10.10
      - INTERNAL_SUBNET=10.252.4.0/24
      - ALLOWEDIPS=10.103.10.0/24,10.103.20.0/24
    volumes:
      - ./wireguard_trust:/config
    ports:
      - 51823:51820/udp
    networks:
      foresta-net: { ipv4_address: 10.103.10.150 }
      forestb-net: { ipv4_address: 10.103.20.150 }
    restart: unless-stopped

  trust-router:
    image: debian:bullseye-slim
    container_name: trust-core-router
    privileged: true
    cap_add:
      - NET_ADMIN
    restart: always 
    command: >
      bash -c "apt-get update && apt-get install -y iptables iproute2 net-tools procps iputils-ping dnsmasq &&
               sysctl -w net.ipv4.ip_forward=1 &&
               iptables -t nat -A POSTROUTING -j MASQUERADE &&
               printf 'server=/foresta.local/10.103.10.10\nserver=/forestb.local/10.103.20.10\n' > /etc/dnsmasq.conf &&
               service dnsmasq restart &&
               sleep infinity"
    networks:
      foresta-net: { ipv4_address: 10.103.10.254 }
      forestb-net: { ipv4_address: 10.103.20.254 }

  dc-foresta:
    image: linuxcrafts/samba-ad-dc:latest
    container_name: dc-foresta
    privileged: true
    entrypoint: ["/bin/sh", "-c", "ip route add 10.103.20.0/24 via 10.103.10.254 || true; exec /samba-ad-dc"]
    environment:
      - DOMAIN=FORESTA
      - REALM=FORESTA.LOCAL
      - ADMIN_PASSWORD=ForestAAdminPass2026!
      - DNS_FORWARDER=10.103.10.254
    volumes:
      - foresta-samba-rw:/var/lib/samba
    networks:
      foresta-net: { ipv4_address: 10.103.10.10 }
    dns: 10.103.10.254
    restart: unless-stopped

  dc-forestb:
    image: linuxcrafts/samba-ad-dc:latest
    container_name: dc-forestb
    privileged: true
    entrypoint: ["/bin/sh", "-c", "ip route add 10.103.10.0/24 via 10.103.20.254 || true; exec /samba-ad-dc"]
    environment:
      - DOMAIN=FORESTB
      - REALM=FORESTB.LOCAL
      - ADMIN_PASSWORD=ForestBAdminPass2026!
      - DNS_FORWARDER=10.103.20.254
    volumes:
      - forestb-samba-rw:/var/lib/samba
    networks:
      forestb-net: { ipv4_address: 10.103.20.10 }
    dns: 10.103.20.254
    restart: unless-stopped

networks:
  foresta-net: { ipam: { config: [{ subnet: 10.103.10.0/24 }] } }
  forestb-net: { ipam: { config: [{ subnet: 10.103.20.0/24 }] } }

volumes:
  foresta-samba-rw:
  forestb-samba-rw:
